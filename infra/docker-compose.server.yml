services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ulfy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-ulfy}
    volumes:
      - ulfy_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ulfy} -d ${POSTGRES_DB:-ulfy}"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ..
      dockerfile: infra/api.Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ulfy}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ulfy}?schema=public
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      ACTIVATION_TOKEN_SECRET: ${ACTIVATION_TOKEN_SECRET:?ACTIVATION_TOKEN_SECRET is required}
      TEMPLATE_REPOSITORY_API_KEY: ${TEMPLATE_REPOSITORY_API_KEY:-}
      TEMPLATE_PREVIEW_PROVIDER_TYPE: ${TEMPLATE_PREVIEW_PROVIDER_TYPE:-openai-compatible}
      TEMPLATE_PREVIEW_ENDPOINT_URL: ${TEMPLATE_PREVIEW_ENDPOINT_URL:-}
      TEMPLATE_PREVIEW_API_KEY: ${TEMPLATE_PREVIEW_API_KEY:-}
      TEMPLATE_PREVIEW_MODEL: ${TEMPLATE_PREVIEW_MODEL:-}
      PORT: 4000
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:4000:4000"

  admin:
    build:
      context: ..
      dockerfile: infra/admin.Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
        NEXT_PUBLIC_BASE_PATH: ${PUBLIC_BASE_PATH:-/backend}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
      NEXT_PUBLIC_BASE_PATH: ${PUBLIC_BASE_PATH:-/backend}
    depends_on:
      - api
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  ulfy_postgres:
