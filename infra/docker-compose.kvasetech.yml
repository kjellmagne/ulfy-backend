services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ulfy
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ulfy
    volumes:
      - ${POSTGRES_DATA_DIR:-/opt/ulfy-data/postgres}:/var/lib/postgresql/data

  api:
    image: ${SKRIVDET_API_IMAGE:-ghcr.io/kjellmagne/ulfy-backend-api:latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://ulfy:${POSTGRES_PASSWORD}@postgres:5432/ulfy?schema=public
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_PREVIOUS_SECRETS: ${JWT_PREVIOUS_SECRETS:-}
      ACTIVATION_TOKEN_SECRET: ${ACTIVATION_TOKEN_SECRET:?ACTIVATION_TOKEN_SECRET is required}
      ACTIVATION_TOKEN_PREVIOUS_SECRETS: ${ACTIVATION_TOKEN_PREVIOUS_SECRETS:-}
      CONFIG_SECRET_KEY: ${CONFIG_SECRET_KEY:?CONFIG_SECRET_KEY is required}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://skrivdet.no,https://www.skrivdet.no}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-true}
      SWAGGER_BASIC_AUTH_USERNAME: ${SWAGGER_BASIC_AUTH_USERNAME:-}
      SWAGGER_BASIC_AUTH_PASSWORD: ${SWAGGER_BASIC_AUTH_PASSWORD:-}
      TEMPLATE_REPOSITORY_API_KEY: ${TEMPLATE_REPOSITORY_API_KEY:-}
      TEMPLATE_PREVIEW_PROVIDER_TYPE: ${TEMPLATE_PREVIEW_PROVIDER_TYPE:-openai-compatible}
      TEMPLATE_PREVIEW_ENDPOINT_URL: ${TEMPLATE_PREVIEW_ENDPOINT_URL:-}
      TEMPLATE_PREVIEW_API_KEY: ${TEMPLATE_PREVIEW_API_KEY:-}
      TEMPLATE_PREVIEW_MODEL: ${TEMPLATE_PREVIEW_MODEL:-}
      PORT: 4000
    ports:
      - "192.168.222.171:4000:4000"
    depends_on:
      - postgres

  admin:
    image: ${SKRIVDET_ADMIN_IMAGE:-ghcr.io/kjellmagne/ulfy-backend-admin:latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: ""
      NEXT_PUBLIC_BASE_PATH: /backend
    ports:
      - "192.168.222.171:3300:3000"
    depends_on:
      - api
