services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ulfy
      POSTGRES_PASSWORD: ulfy
      POSTGRES_DB: ulfy
    volumes:
      - ulfy_postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ulfy"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: infra/api.Dockerfile
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://ulfy:ulfy@postgres:5432/ulfy?schema=public
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_PREVIOUS_SECRETS: ${JWT_PREVIOUS_SECRETS:-}
      ACTIVATION_TOKEN_SECRET: ${ACTIVATION_TOKEN_SECRET:?ACTIVATION_TOKEN_SECRET is required}
      ACTIVATION_TOKEN_PREVIOUS_SECRETS: ${ACTIVATION_TOKEN_PREVIOUS_SECRETS:-}
      CONFIG_SECRET_KEY: ${CONFIG_SECRET_KEY:?CONFIG_SECRET_KEY is required}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://localhost:3001,http://127.0.0.1:3001}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-true}
      SWAGGER_BASIC_AUTH_USERNAME: ${SWAGGER_BASIC_AUTH_USERNAME:-}
      SWAGGER_BASIC_AUTH_PASSWORD: ${SWAGGER_BASIC_AUTH_PASSWORD:-}
      TEMPLATE_REPOSITORY_API_KEY: ${TEMPLATE_REPOSITORY_API_KEY:-}
      TEMPLATE_PREVIEW_PROVIDER_TYPE: ${TEMPLATE_PREVIEW_PROVIDER_TYPE:-openai-compatible}
      TEMPLATE_PREVIEW_ENDPOINT_URL: ${TEMPLATE_PREVIEW_ENDPOINT_URL:-}
      TEMPLATE_PREVIEW_API_KEY: ${TEMPLATE_PREVIEW_API_KEY:-}
      TEMPLATE_PREVIEW_MODEL: ${TEMPLATE_PREVIEW_MODEL:-}
      PORT: 4000
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4000:4000"

  admin:
    build:
      context: ..
      dockerfile: infra/admin.Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000}
        NEXT_PUBLIC_BASE_PATH: ${NEXT_PUBLIC_BASE_PATH:-}
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000}
      NEXT_PUBLIC_BASE_PATH: ${NEXT_PUBLIC_BASE_PATH:-}
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  ulfy_postgres:
